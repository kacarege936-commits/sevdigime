<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seni Çok Özledim!</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
  }
  .glass-card {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 30px;
    text-align: center;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 8px 32px 0 rgba(255, 117, 140, 0.4);
    z-index: 10;
    animation: popIn 1s ease-out;
  }
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  
  /* Sabit Fotoğraf Alanı */
  .photo-container {
    width: 200px;
    height: 200px;
    margin: 0 auto 20px;
    position: relative;
    border: 6px solid #fff;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    overflow: hidden;
    display: none; /* İlk başta gizli */
  }
  .photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  .photo-container img.active {
    opacity: 1;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    color: #fff;
    font-size: 3rem;
    margin: 10px 0;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
  }
  p {
    color: #fff;
    font-size: 1.1rem;
    line-height: 1.6;
    min-height: 120px;
  }
  .heart-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  .floating-heart {
    position: absolute;
    color: rgba(255, 255, 255, 0.7);
    animation: floatUp linear infinite;
    bottom: -50px;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }
  button {
    background: #fff;
    color: #ff758c;
    border: none;
    padding: 15px 35px;
    font-size: 1.2rem;
    font-weight: 600;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  .cursor {
    display: inline-block;
    width: 2px;
    background-color: #fff;
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="heart-bg" id="heartContainer"></div>

<div class="glass-card">
  <div id="introBox">
    <h1>⚠Sana Bir Şey Söylemem Lazım Şekerliğim⚠...</h1>
    <button onclick="showMessage()">Açmak İçin Tıkla ❤️</button>
  </div>
  
  <div id="messageBox" style="display:none;">
    <div class="photo-container" id="photoContainer">
        <img src="<img src="resim1.jpg">" class="active">
        <img src="<img src="resim2.jpg">">
        <img src="<img src="resim3.jpg">">
    </div>
    <h1>Sevgilime(Şekerliğime)...</h1>
    <p><span id="typedText"></span><span class="cursor">&nbsp;</span></p>
  </div>
</div>

<script>
  // Arka Plan Kalpleri
  const container = document.getElementById('heartContainer');
  const hearts = ['❤️', '💖', '💕', '✨'];
  
  function createHeart() {
    const h = document.createElement('div');
    h.classList.add('floating-heart');
    h.innerText = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.animationDuration = (Math.random() * 3 + 4) + 's';
    h.style.fontSize = (Math.random() * 15 + 15) + 'px';
    container.appendChild(h);
    setTimeout(() => h.remove(), 7000);
  }
  setInterval(createHeart, 400);

  // Sabit Fotoğraf Döngüsü
  let currentPhoto = 0;
  function cyclePhotos() {
    const images = document.querySelectorAll('.photo-container img');
    if (images.length < 2) return;
    
    images[currentPhoto].classList.remove('active');
    currentPhoto = (currentPhoto + 1) % images.length;
    images[currentPhoto].classList.add('active');
  }

  // Yazı Efekti
  const text = "Tam 1 haftadır seni görmüyorum... İnan saniyeler bile geçmek bilmiyor. Seni O KADAR ÇOK özledim ki! Şu an tek istediğim hemen yanına gelmek, o güzel saçlarını okşamak koklamak... Sana sımsıkı sarılmak, doya doya öpmek ve gözlerinin içine bakarak saatlerce konuşmak istiyorum. İyi ki varsın😘";
  let i = 0;

  function showMessage() {
    document.getElementById('introBox').style.display = 'none';
    document.getElementById('messageBox').style.display = 'block';
    document.getElementById('photoContainer').style.display = 'block';
    
    // Fotoğraflar 2.4 saniyede bir değişsin
    setInterval(cyclePhotos, 3000);
    typeWriter();
  }

  function typeWriter() {
    if (i < text.length) {
      document.getElementById("typedText").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, 50);
    }
  }
</script>
</body>
</html>
